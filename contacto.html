<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | GYMXPERIENCE</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">GYMXPERIENCE</a>
            <ul class="nav-menu">
                <li><a href="index.html">Inicio</a></li>
                <li><a href="servicios.html">Servicios</a></li>
                <li><a href="tarifas.html">Precios</a></li>
                <li><a href="contacto.html" class="btn-nav">EMPEZAR</a></li>
            </ul>
        </div>
    </nav>

    <main class="main-content" style="padding: 40px 20px; max-width: 600px; margin: auto;">
        <section class="registro">
            <h2 style="color: #6e31b0; text-align: center;">¿LISTO PARA EL CAMBIO?</h2>
            <p style="text-align: center; margin-bottom: 30px;">Déjanos tus datos y nos pondremos en contacto contigo hoy mismo.</p>
            
            <form action="#">
                <div class="campo" style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px;">Nombre completo</label>
                    <input type="text" placeholder="Ej. Juan Pérez" required style="width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #ccc;">
                </div>
                <div class="campo" style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px;">Correo electrónico</label>
                    <input type="email" placeholder="tu@email.com" required style="width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #ccc;">
                </div>
                <div class="campo" style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px;">Teléfono</label>
                    <input type="tel" placeholder="600 000 000" style="width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #ccc;">
                </div>
                <div class="campo" style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px;">Plan de interés</label>
                    <select style="width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #ccc;">
                        <option>Básico</option>
                        <option>Premium</option>
                        <option>Ultimate</option>
                    </select>
                </div>
                <button type="submit" style="width: 100%; background: #6e31b0; color: white; border: none; padding: 15px; border-radius: 5px; font-weight: bold; cursor: pointer;">ENVIAR SOLICITUD</button>
            </form>
        </section>
    </main>

    <footer style="text-align: center; padding: 20px; margin-top: 50px;">
        <p>&copy; 2026 GYMXPERIENCE - Proyecto ASIR</p>
    </footer>
</body>
</html>
